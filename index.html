<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOS Group — Жамбыл облысы оқушы еріктілер қозғалысы</title>
<meta name="description" content="DOS Group — Жамбыл облысындағы мектеп ерікті жастар ұйымы. Қамқорлық — қолдан қолға / Забота — из рук в руки / Care, hand to hand.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===================================================================
   DOS GROUP — STYLESHEET
   Organized in clearly labeled sections. Search for "===== " markers
   to jump around. Colour + type tokens live in :root at the very top
   — change a value there and it updates everywhere.
=================================================================== */

/* ----- 1. TOKENS (edit colours / fonts / spacing here) ----- */
:root{
  /* brand colours, drawn from the DOS Group mark (hand + nested hearts) */
  --ink:        #1F2933;
  --ink-soft:   #51606e;
  --cream:      #FBF7EF;
  --cream-deep: #F1E9D8;
  --white:      #FFFFFF;

  --blue:       #2F5D8A;  /* the hand */
  --blue-dark:  #20415F;
  --blue-pale:  #D9ECF7;  /* the outer / sky heart */
  --blue-pale-deep: #BFE3F4;

  --green:      #4AAE63;  /* the inner heart */
  --green-dark: #36864A;
  --green-pale: #DFF1E1;

  --teal:       #2C9C92;  /* Children & Youth */
  --teal-pale:  #DCF0EC;

  --gold:       #DE9F3C;  /* Culture & Art */
  --gold-pale:  #F8E9D1;

  --slate:      #8993A1;  /* internal / team-life tag */

  --radius-s: 10px;
  --radius-m: 18px;
  --radius-l: 28px;

  --shadow-sm: 0 2px 10px rgba(31,41,51,.06);
  --shadow-md: 0 14px 34px rgba(31,41,51,.10);
  --shadow-lg: 0 24px 60px rgba(31,41,51,.16);

  --font-display: "Unbounded", "Manrope", sans-serif;
  --font-body: "Manrope", "Segoe UI", sans-serif;

  --container: 1180px;
}

/* ----- 2. RESET ----- */
*,*::before,*::after{ box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{ margin:0; }
img{ max-width:100%; display:block; }
button{ font:inherit; }
ul{ margin:0; padding:0; }
a{ color:inherit; text-decoration:none; }
h1,h2,h3,h4,p{ margin:0; }

@media (prefers-reduced-motion: reduce){
  html{ scroll-behavior:auto; }
  *,*::before,*::after{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
}

/* ----- 3. BASE ----- */
body{
  font-family:var(--font-body);
  background:var(--cream);
  color:var(--ink);
  line-height:1.6;
  font-size:16px;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

.container{
  max-width:var(--container);
  margin:0 auto;
  padding:0 24px;
}

.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-family:var(--font-body);
  font-weight:700;
  font-size:.78rem;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--blue);
}
.eyebrow::before{
  content:"";
  width:18px; height:2px;
  background:var(--green);
  border-radius:2px;
}

h2.section-title{
  font-family:var(--font-display);
  font-weight:700;
  font-size:clamp(1.8rem, 1.2rem + 2.6vw, 2.9rem);
  line-height:1.12;
  letter-spacing:-.01em;
  color:var(--ink);
  margin-top:10px;
}

.section-head{
  max-width:680px;
  margin-bottom:48px;
}
.section-head p{
  margin-top:14px;
  font-size:1.05rem;
  color:var(--ink-soft);
}
.section-head.center{
  margin-inline:auto;
  text-align:center;
}
.section-head.center .eyebrow{ justify-content:center; width:100%; }

section{
  padding:88px 0;
  position:relative;
}
@media (max-width: 720px){
  section{ padding:64px 0; }
}

.bg-cream-deep{ background:var(--cream-deep); }
.bg-white{ background:var(--white); }
.bg-ink{ background:var(--blue-dark); color:var(--white); }

/* ----- 4. BUTTONS ----- */
.btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:14px 26px;
  border-radius:999px;
  font-weight:700;
  font-size:.96rem;
  border:2px solid transparent;
  cursor:pointer;
  transition:transform .25s ease, box-shadow .25s ease, background .25s ease, color .25s ease;
  white-space:nowrap;
}
.btn:active{ transform:scale(.97); }
.btn-primary{
  background:var(--blue);
  color:var(--white);
  box-shadow:var(--shadow-md);
}
.btn-primary:hover{ background:var(--blue-dark); transform:translateY(-2px); }
.btn-ghost{
  background:transparent;
  color:var(--blue);
  border-color:var(--blue-pale-deep);
}
.btn-ghost:hover{ border-color:var(--blue); background:var(--blue-pale); transform:translateY(-2px); }
.btn-light{
  background:var(--white);
  color:var(--blue);
  box-shadow:var(--shadow-md);
}
.btn-light:hover{ transform:translateY(-2px); }
.btn svg{ width:18px; height:18px; flex:none; }

/* ----- 5. HEADER ----- */
.site-header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(251,247,239,.85);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(31,41,51,.07);
}
.header-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  height:78px;
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
  font-family:var(--font-display);
  font-weight:700;
  font-size:1.05rem;
  color:var(--ink);
  flex:none;
}
.brand .mark{ width:42px; height:42px; flex:none; }
.brand small{
  display:block;
  font-family:var(--font-body);
  font-weight:600;
  font-size:.66rem;
  letter-spacing:.07em;
  color:var(--ink-soft);
  text-transform:uppercase;
}

.main-nav{
  display:flex;
  align-items:center;
  gap:30px;
}
.main-nav a{
  font-weight:600;
  font-size:.95rem;
  color:var(--ink-soft);
  position:relative;
  padding:6px 0;
  transition:color .2s ease;
}
.main-nav a::after{
  content:"";
  position:absolute; left:0; bottom:0;
  width:0; height:2px;
  background:var(--green);
  transition:width .25s ease;
  border-radius:2px;
}
.main-nav a:hover{ color:var(--ink); }
.main-nav a:hover::after{ width:100%; }

.header-actions{
  display:flex;
  align-items:center;
  gap:14px;
}

.lang-switch{
  display:flex;
  gap:3px;
  background:var(--white);
  border-radius:999px;
  padding:4px;
  box-shadow:var(--shadow-sm);
  flex:none;
}
.lang-switch button{
  border:none;
  background:transparent;
  color:var(--ink-soft);
  font-weight:700;
  font-size:.74rem;
  letter-spacing:.04em;
  padding:7px 11px;
  border-radius:999px;
  cursor:pointer;
  transition:background .2s ease, color .2s ease;
}
.lang-switch button.active{
  background:var(--blue);
  color:var(--white);
}
.lang-switch button:not(.active):hover{ background:var(--blue-pale); color:var(--blue); }

.nav-toggle{
  display:none;
  flex:none;
  width:42px; height:42px;
  border-radius:999px;
  border:none;
  background:var(--white);
  box-shadow:var(--shadow-sm);
  cursor:pointer;
  position:relative;
}
.nav-toggle span{
  position:absolute; left:11px; right:11px; height:2px;
  background:var(--ink);
  border-radius:2px;
  transition:transform .25s ease, opacity .25s ease, top .25s ease;
}
.nav-toggle span:nth-child(1){ top:15px; }
.nav-toggle span:nth-child(2){ top:21px; }
.nav-toggle span:nth-child(3){ top:27px; }
.nav-toggle.open span:nth-child(1){ top:21px; transform:rotate(45deg); }
.nav-toggle.open span:nth-child(2){ opacity:0; }
.nav-toggle.open span:nth-child(3){ top:21px; transform:rotate(-45deg); }

@media (max-width: 860px){
  .main-nav{
    position:fixed;
    inset:78px 0 0 0;
    flex-direction:column;
    align-items:stretch;
    gap:0;
    background:var(--cream);
    padding:10px 24px 28px;
    transform:translateY(-12px);
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    border-bottom:1px solid rgba(31,41,51,.07);
    box-shadow:var(--shadow-md);
  }
  .main-nav.open{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }
  .main-nav a{
    padding:16px 4px;
    border-bottom:1px solid rgba(31,41,51,.07);
    font-size:1.05rem;
  }
  .main-nav a::after{ display:none; }
  .nav-toggle{ display:block; }
}

/* ----- 6. HERO ----- */
.hero{
  padding:64px 0 40px;
  overflow:hidden;
}
.hero-grid{
  display:grid;
  grid-template-columns:1.05fr .95fr;
  gap:48px;
  align-items:center;
}
@media (max-width: 920px){
  .hero-grid{ grid-template-columns:1fr; gap:40px; }
  .hero-art{ order:-1; }
}

.hero h1{
  font-family:var(--font-display);
  font-weight:800;
  font-size:clamp(2.3rem, 1.4rem + 4.2vw, 4.1rem);
  line-height:1.04;
  letter-spacing:-.015em;
  color:var(--blue-dark);
  margin-top:18px;
}
.hero h1 em{
  font-style:normal;
  color:var(--green-dark);
}
.hero .lede{
  margin-top:22px;
  font-size:clamp(1.02rem, .95rem + .3vw, 1.2rem);
  color:var(--ink-soft);
  max-width:540px;
}
.hero-ctas{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  margin-top:34px;
}

.hero-stats{
  display:flex;
  gap:28px;
  margin-top:48px;
  flex-wrap:wrap;
}
.hero-stat b{
  display:block;
  font-family:var(--font-display);
  font-weight:800;
  font-size:1.9rem;
  color:var(--blue-dark);
}
.hero-stat span{
  font-size:.82rem;
  color:var(--ink-soft);
  font-weight:600;
}

.hero-art{
  position:relative;
  display:flex;
  justify-content:center;
}
.hero-art .art-wrap{
  position:relative;
  width:min(420px, 100%);
}
.hero-art svg{ width:100%; height:auto; }
.hero-art .blob{
  position:absolute;
  inset:6% 4%;
  background:radial-gradient(circle at 32% 28%, var(--blue-pale) 0%, rgba(217,236,247,0) 68%);
  border-radius:50%;
  z-index:0;
  filter:blur(2px);
}
.pulse-heart{
  transform-origin:center;
  animation:pulse 2.6s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.06); }
}
.float-ring{
  animation:spin 26s linear infinite;
  transform-origin:210px 210px;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

.hero-wave{
  display:block;
  width:100%;
  margin-top:-2px;
}

/* ----- 7. ABOUT ----- */
.about-grid{
  display:grid;
  grid-template-columns:.95fr 1.05fr;
  gap:56px;
  align-items:center;
}
@media (max-width: 880px){
  .about-grid{ grid-template-columns:1fr; gap:34px; }
}
.about-card{
  background:var(--white);
  border-radius:var(--radius-l);
  padding:36px;
  box-shadow:var(--shadow-md);
  position:relative;
}
.about-card .quote-mark{
  font-family:var(--font-display);
  font-size:3.4rem;
  color:var(--blue-pale-deep);
  line-height:1;
  margin-bottom:6px;
}
.about-card p{
  font-size:1.08rem;
  color:var(--ink);
}
.about-pillars{
  display:grid;
  gap:18px;
}
.pillar-row{
  display:flex;
  gap:16px;
  align-items:flex-start;
  padding:18px 20px;
  background:var(--white);
  border-radius:var(--radius-m);
  box-shadow:var(--shadow-sm);
}
.pillar-row .ico{
  flex:none;
  width:44px; height:44px;
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  background:var(--green-pale);
  color:var(--green-dark);
}
.pillar-row .ico svg{ width:22px; height:22px; }
.pillar-row h4{
  font-family:var(--font-display);
  font-size:1rem;
  font-weight:700;
  color:var(--ink);
}
.pillar-row p{
  margin-top:4px;
  font-size:.93rem;
  color:var(--ink-soft);
}

/* ----- 8. STATS (today + year) ----- */
.founding-card{
  display:flex;
  align-items:center;
  gap:36px;
  background:var(--white);
  border-radius:var(--radius-l);
  padding:44px 48px;
  box-shadow:var(--shadow-md);
  flex-wrap:wrap;
}
.founding-badge{
  flex:none;
  width:148px; height:148px;
  border-radius:50%;
  background:var(--blue-pale);
  color:var(--blue-dark);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.founding-badge svg{ width:32px; height:32px; }
.founding-badge span{
  font-family:var(--font-display);
  font-weight:800;
  font-size:1.6rem;
}
.founding-card h3{
  font-family:var(--font-display);
  font-weight:700;
  font-size:1.28rem;
  color:var(--ink);
  max-width:560px;
}
.founding-card p{
  margin-top:12px;
  font-size:1rem;
  color:var(--ink-soft);
  max-width:620px;
}
@media (max-width: 680px){
  .founding-card{ flex-direction:column; text-align:center; padding:36px 28px; }
}

.year-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:16px;
}
@media (max-width: 900px){ .year-grid{ grid-template-columns:repeat(2, 1fr); } }
@media (max-width: 560px){ .year-grid{ grid-template-columns:1fr; } }
.stat-tile-sm{
  background:var(--white);
  border-radius:var(--radius-m);
  padding:24px 22px;
  box-shadow:var(--shadow-sm);
  border-left:4px solid var(--blue);
}
.stat-tile-sm .num{
  font-family:var(--font-display);
  font-weight:800;
  font-size:1.7rem;
  color:var(--blue-dark);
}
.stat-tile-sm .lbl{
  margin-top:6px;
  font-size:.88rem;
  font-weight:600;
  color:var(--ink-soft);
  line-height:1.35;
}

/* ----- 9. DIRECTIONS ----- */
.directions-grid{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:20px;
}
@media (max-width: 980px){ .directions-grid{ grid-template-columns:repeat(2, 1fr); } }
@media (max-width: 560px){ .directions-grid{ grid-template-columns:1fr; } }

.direction-card{
  background:var(--white);
  border-radius:var(--radius-l);
  padding:30px 26px;
  box-shadow:var(--shadow-sm);
  transition:transform .25s ease, box-shadow .25s ease;
  border-top:5px solid var(--dir-color, var(--blue));
}
.direction-card:hover{
  transform:translateY(-6px);
  box-shadow:var(--shadow-lg);
}
.direction-card .ico{
  width:54px; height:54px;
  border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  background:var(--dir-tint, var(--blue-pale));
  color:var(--dir-color, var(--blue));
  margin-bottom:18px;
}
.direction-card .ico svg{ width:28px; height:28px; }
.direction-card h3{
  font-family:var(--font-display);
  font-size:1.12rem;
  font-weight:700;
  color:var(--ink);
}
.direction-card p{
  margin-top:10px;
  font-size:.92rem;
  color:var(--ink-soft);
}
.direction-card .lead{
  margin-top:16px;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:.82rem;
  font-weight:700;
  color:var(--dir-color, var(--blue));
}
.direction-card .lead .avatar-dot{
  width:24px; height:24px;
  border-radius:50%;
  background:var(--dir-color, var(--blue));
  color:#fff;
  font-size:.62rem;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display);
  flex:none;
}

/* ----- 10. PROJECTS ----- */
.project-featured{
  background:linear-gradient(150deg, var(--blue-dark) 0%, var(--blue) 70%, var(--green-dark) 130%);
  color:var(--white);
  border-radius:var(--radius-l);
  padding:40px;
  margin-bottom:34px;
  box-shadow:var(--shadow-lg);
  position:relative;
  overflow:hidden;
}
.project-featured::after{
  content:"";
  position:absolute; right:-60px; bottom:-90px;
  width:280px; height:280px;
  border-radius:50%;
  background:rgba(255,255,255,.06);
}
.featured-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:rgba(255,255,255,.16);
  padding:7px 16px;
  border-radius:999px;
  font-size:.78rem;
  font-weight:700;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.featured-badge svg{ width:15px; height:15px; }
.project-featured h3{
  font-family:var(--font-display);
  font-weight:700;
  font-size:clamp(1.5rem, 1.2rem + 1.3vw, 2.1rem);
  margin-top:18px;
  max-width:680px;
  position:relative;
}
.project-featured .ft-grid{
  display:grid;
  grid-template-columns:1.3fr 1fr;
  gap:34px;
  margin-top:24px;
  position:relative;
}
@media (max-width: 800px){ .project-featured .ft-grid{ grid-template-columns:1fr; } }
.project-featured .ft-col h5{
  font-size:.78rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  opacity:.75;
  font-weight:700;
  margin-bottom:8px;
}
.project-featured .ft-col p{ opacity:.95; font-size:.97rem; }
.project-featured ul{ display:grid; gap:8px; margin-top:4px; }
.project-featured li{
  font-size:.95rem;
  padding-left:20px;
  position:relative;
}
.project-featured li::before{
  content:"";
  position:absolute; left:0; top:9px;
  width:8px; height:8px;
  border-radius:50%;
  background:var(--green);
}
.project-featured .ft-actions{
  margin-top:28px;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  position:relative;
}

.projects-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:22px;
}
@media (max-width: 980px){ .projects-grid{ grid-template-columns:repeat(2, 1fr); } }
@media (max-width: 660px){ .projects-grid{ grid-template-columns:1fr; } }

.project-card{
  background:var(--white);
  border-radius:var(--radius-m);
  padding:26px;
  box-shadow:var(--shadow-sm);
  display:flex;
  flex-direction:column;
}
.project-card .tag{
  display:inline-flex;
  align-self:flex-start;
  align-items:center;
  gap:6px;
  padding:5px 12px;
  border-radius:999px;
  background:var(--tag-tint, var(--blue-pale));
  color:var(--tag-color, var(--blue));
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.03em;
  text-transform:uppercase;
}
.project-card h3{
  font-family:var(--font-display);
  font-size:1.06rem;
  font-weight:700;
  margin-top:14px;
  color:var(--ink);
  line-height:1.3;
}
.project-card .goal{
  margin-top:10px;
  font-size:.92rem;
  color:var(--ink-soft);
}
.project-card .details{
  margin-top:14px;
  display:grid;
  gap:14px;
  max-height:0;
  opacity:0;
  overflow:hidden;
  transition:max-height .35s ease, opacity .3s ease, margin-top .35s ease;
}
.project-card.open .details{
  max-height:900px;
  opacity:1;
}
.project-card .details h5{
  font-size:.74rem;
  text-transform:uppercase;
  letter-spacing:.07em;
  color:var(--ink-soft);
  font-weight:700;
  margin-bottom:5px;
}
.project-card .details p, .project-card .details li{ font-size:.9rem; color:var(--ink); }
.project-card .details ul{ display:grid; gap:6px; }
.project-card .details li{ padding-left:18px; position:relative; }
.project-card .details li::before{
  content:""; position:absolute; left:0; top:8px;
  width:6px; height:6px; border-radius:50%;
  background:var(--tag-color, var(--green));
}
.project-card .card-foot{
  margin-top:18px;
  padding-top:16px;
  border-top:1px solid rgba(31,41,51,.08);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-top:auto;
}
.toggle-btn{
  background:none;
  border:none;
  cursor:pointer;
  font-weight:700;
  font-size:.86rem;
  color:var(--tag-color, var(--blue));
  display:flex;
  align-items:center;
  gap:6px;
  padding:0;
}
.toggle-btn svg{
  width:15px; height:15px;
  transition:transform .3s ease;
}
.project-card.open .toggle-btn svg{ transform:rotate(180deg); }
.reel-link{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:.84rem;
  font-weight:700;
  color:var(--ink-soft);
  transition:color .2s ease;
}
.reel-link:hover{ color:var(--ink); }
.reel-link svg{ width:16px; height:16px; }

/* ----- 11. TEAM ----- */
.curator-card{
  display:flex;
  align-items:center;
  gap:24px;
  background:var(--white);
  border-radius:var(--radius-l);
  padding:30px 34px;
  box-shadow:var(--shadow-md);
  margin-bottom:36px;
  flex-wrap:wrap;
}
.avatar{
  flex:none;
  width:78px; height:78px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display);
  font-weight:700;
  font-size:1.3rem;
  color:#fff;
}
.curator-card .avatar{ width:84px; height:84px; font-size:1.45rem; background:var(--blue); }
.curator-card.spotlight{
  border-left:6px solid var(--green);
  padding-left:28px;
  margin-bottom:24px;
}
.curator-card .role-tag{
  display:inline-block;
  font-size:.74rem;
  font-weight:700;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:4px;
}
.curator-card h3{
  font-family:var(--font-display);
  font-size:1.25rem;
  font-weight:700;
}
.curator-card p{ margin-top:4px; color:var(--ink-soft); font-size:.94rem; }

.team-grid{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:20px;
}
@media (max-width: 980px){ .team-grid{ grid-template-columns:repeat(2, 1fr); } }
@media (max-width: 520px){ .team-grid{ grid-template-columns:1fr; } }
.team-card{
  background:var(--white);
  border-radius:var(--radius-m);
  padding:26px 22px;
  text-align:center;
  box-shadow:var(--shadow-sm);
  transition:transform .25s ease, box-shadow .25s ease;
}
.team-card:hover{ transform:translateY(-5px); box-shadow:var(--shadow-md); }
.team-card .avatar{ margin:0 auto 16px; }
.team-card h4{
  font-family:var(--font-display);
  font-size:1rem;
  font-weight:700;
  color:var(--ink);
}
.team-card .role-tag{
  display:block;
  margin-top:8px;
  font-size:.78rem;
  font-weight:600;
  color:var(--ink-soft);
  line-height:1.35;
}

/* ----- 12. CTA / FOOTER ----- */
.cta-band{
  background:linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
  border-radius:var(--radius-l);
  padding:56px;
  color:var(--white);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:30px;
  flex-wrap:wrap;
  position:relative;
  overflow:hidden;
}
.cta-band::before{
  content:"";
  position:absolute; left:-50px; top:-60px;
  width:200px; height:200px; border-radius:50%;
  background:rgba(255,255,255,.07);
}
.cta-band h2{
  font-family:var(--font-display);
  font-size:clamp(1.6rem, 1.3rem + 1.4vw, 2.3rem);
  font-weight:700;
  max-width:480px;
  position:relative;
}
.cta-band p{ margin-top:10px; opacity:.85; max-width:440px; position:relative; }
.cta-band .ctas{ display:flex; gap:14px; flex-wrap:wrap; position:relative; }

footer.site-footer{
  background:var(--blue-dark);
  color:rgba(255,255,255,.78);
  padding:60px 0 28px;
}
.footer-grid{
  display:grid;
  grid-template-columns:1.2fr 1fr 1fr;
  gap:40px;
}
@media (max-width: 760px){ .footer-grid{ grid-template-columns:1fr; gap:32px; } }
.footer-brand{
  display:flex;
  align-items:center;
  gap:12px;
  color:#fff;
  font-family:var(--font-display);
  font-weight:700;
  font-size:1.1rem;
}
.footer-brand .mark{ width:38px; height:38px; }
.footer-grid p{ margin-top:14px; font-size:.92rem; line-height:1.6; max-width:320px; }
.footer-col h5{
  font-size:.76rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:rgba(255,255,255,.55);
  font-weight:700;
  margin-bottom:14px;
}
.footer-col ul{ display:grid; gap:10px; }
.footer-col li{ display:inline-flex; align-items:center; gap:8px; }
.footer-col li svg{ width:16px; height:16px; flex:none; }
.footer-qr{
  margin-top:22px;
  display:flex;
  align-items:center;
  gap:14px;
}
.footer-qr .qr-box{
  background:#fff;
  border-radius:10px;
  padding:8px;
  flex:none;
  width:84px; height:84px;
}
.footer-qr .qr-box svg{ width:100%; height:100%; display:block; }
.footer-qr span{
  font-size:.82rem;
  color:rgba(255,255,255,.72);
  max-width:170px;
  line-height:1.45;
}
.footer-col a{
  font-size:.94rem;
  color:rgba(255,255,255,.85);
  transition:color .2s ease;
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.footer-col a:hover{ color:#fff; }
.footer-col a svg{ width:16px; height:16px; flex:none; }
.footer-bottom{
  margin-top:48px;
  padding-top:22px;
  border-top:1px solid rgba(255,255,255,.14);
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  font-size:.82rem;
  color:rgba(255,255,255,.55);
}

/* ----- 13. UTIL ----- */
.reveal{
  opacity:0;
  transform:translateY(18px);
  transition:opacity .6s ease, transform .6s ease;
}
.reveal.in{
  opacity:1;
  transform:translateY(0);
}
.skip-link{
  position:absolute; left:-9999px;
}
.skip-link:focus{
  left:16px; top:10px;
  background:var(--ink); color:#fff;
  padding:8px 14px; border-radius:8px; z-index:1000;
}
:focus-visible{
  outline:3px solid var(--gold);
  outline-offset:2px;
}

</style>
</head>

            <p>${f.work}</p>
          </div>
          <div class="ft-col">
            <h5 data-i18n="label_results"></h5>
            <ul>${f.results.map(r => `<li>${r}</li>`).join("")}</ul>
          </div>
        </div>
        <div class="ft-actions">
          ${featured.link ? `<a class="btn btn-light" href="${featured.link}" target="_blank" rel="noopener">${ICONS.play}<span data-i18n="watch_reel"></span></a>` : ""}
        </div>`;
      fEl.querySelector('[data-i18n="featured_badge"]').textContent = UI[LANG].featured_badge;
      fEl.querySelector('[data-i18n="label_work"]').textContent = UI[LANG].label_work;
      fEl.querySelector('[data-i18n="label_results"]').textContent = UI[LANG].label_results;
      const reelSpan = fEl.querySelector('[data-i18n="watch_reel"]');
      if (reelSpan) reelSpan.textContent = UI[LANG].watch_reel;
    }

    const gEl = document.getElementById("projectsGrid");
    gEl.innerHTML = rest.map((p, i) => {
      const tagColor = colorVars(TAG_COLOR[p.tag]);
      const c = p[LANG];
      return `
      <article class="project-card reveal" style="--tag-color:${tagColor.c}; --tag-tint:${tagColor.t}">
        <span class="tag">${TAG_LABELS[p.tag][LANG]}</span>
        <h3>${c.title}</h3>
        <p class="goal">${c.goal}</p>
        <div class="details">
          <div>
            <h5>${UI[LANG].label_work}</h5>
            <p>${c.work}</p>
          </div>
          <div>
            <h5>${UI[LANG].label_results}</h5>
            <ul>${c.results.map(r => `<li>${r}</li>`).join("")}</ul>
          </div>
        </div>
        <div class="card-foot">
          <button class="toggle-btn" type="button" data-toggle>
            <span data-state-label>${UI[LANG].read_more}</span>${ICONS.chevron}
          </button>
          ${p.link ? `<a class="reel-link" href="${p.link}" target="_blank" rel="noopener">${ICONS.instagram}<span>${UI[LANG].watch_reel}</span></a>` : ""}
        </div>
      </article>`;
    }).join("");

    gEl.querySelectorAll(".project-card").forEach(card => {
      const btn = card.querySelector("[data-toggle]");
      const label = card.querySelector("[data-state-label]");
      btn.addEventListener("click", () => {
        const open = card.classList.toggle("open");
        label.textContent = open ? UI[LANG].read_less : UI[LANG].read_more;
      });
    });
  }

  /* ---------- render: team ---------- */
  function renderTeam(){
    const curEl = document.getElementById("curatorCard");
    curEl.innerHTML = `
      <div class="avatar" style="background:var(--blue)">${initials(CURATOR[LANG])}</div>
      <div>
        <span class="role-tag" data-i18n="curator_role"></span>
        <h3>${CURATOR[LANG]}</h3>
        <p data-i18n="team_sub"></p>
      </div>`;
    curEl.querySelector('[data-i18n="curator_role"]').textContent = UI[LANG].curator_role;
    curEl.querySelector('[data-i18n="team_sub"]').textContent = UI[LANG].footer_about_text ? UI[LANG].team_sub : UI[LANG].team_sub;

    const spotlightMember = TEAM.find(m => m.lead);
    const spotEl = document.getElementById("teamSpotlight");
    if (spotEl){
      if (spotlightMember){
        const cv = colorVars(spotlightMember.color);
        spotEl.innerHTML = `
          <div class="avatar" style="background:${cv.c}">${initials(spotlightMember.name[LANG])}</div>
          <div>
            <span class="role-tag" style="color:var(--green-dark)">${spotlightMember.role[LANG]}</span>
            <h3>${spotlightMember.name[LANG]}</h3>
          </div>`;
        spotEl.style.display = "";
      } else {
        spotEl.style.display = "none";
      }
    }

    const grid = document.getElementById("teamGrid");
    grid.innerHTML = TEAM.filter(m => !m.lead).map(m => {
      const cv = colorVars(m.color);
      return `
      <div class="team-card reveal">
        <div class="avatar" style="background:${cv.c}">${initials(m.name[LANG])}</div>
        <h4>${m.name[LANG]}</h4>
        <span class="role-tag">${m.role[LANG]}</span>
      </div>`;
    }).join("");
  }

  /* ---------- apply static UI strings (data-i18n attr) ---------- */
  function applyStaticStrings(){
    document.querySelectorAll("[data-i18n]").forEach(node => {
      const key = node.getAttribute("data-i18n");
      if (UI[LANG][key] !== undefined) node.textContent = UI[LANG][key];
    });
    document.getElementById("aboutText").textContent = ABOUT_TEXT[LANG];
    document.getElementById("closingText").textContent = CLOSING_TEXT[LANG];
    document.documentElement.lang = LANG === "kz" ? "kk" : LANG;
  }

  /* ---------- count-up animation ---------- */
  function animateCount(el){
    const target = parseInt(el.getAttribute("data-count"), 10);
    if (Number.isNaN(target) || el.dataset.done) return;
    el.dataset.done = "1";
    const dur = 1100;
    const start = performance.now();
    function tick(now){
      const p = Math.min(1, (now - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(eased * target);
      if (p < 1) requestAnimationFrame(tick);
      else el.textContent = target;
    }
    requestAnimationFrame(tick);
  }

  /* ---------- scroll reveal + count-up trigger ---------- */
  function setupObservers(){
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting){
          entry.target.classList.add("in");
          entry.target.querySelectorAll("[data-count]").forEach(animateCount);
          if (entry.target.hasAttribute("data-count")) animateCount(entry.target);
        }
      });
    }, { threshold: 0.25 });
    document.querySelectorAll(".reveal, #heroStats").forEach(el => io.observe(el));
  }

  /* ---------- language switch ---------- */
  function setLang(lang){
    LANG = lang;
    document.querySelectorAll(".lang-switch button").forEach(b => {
      b.classList.toggle("active", b.dataset.lang === lang);
    });
    applyStaticStrings();
    renderHeroStats();
    renderStatsToday();
    renderStatsYear();
    renderDirections();
    renderProjects();
    renderTeam();
    // re-run count-up immediately for anything already on screen
    document.querySelectorAll("[data-count]").forEach(el => { el.dataset.done = ""; });
    setupObservers();
  }

  /* ---------- mobile nav ---------- */
  function setupNav(){
    const toggle = document.getElementById("navToggle");
    const nav = document.getElementById("mainNav");
    toggle.addEventListener("click", () => {
      const open = nav.classList.toggle("open");
      toggle.classList.toggle("open", open);
      toggle.setAttribute("aria-expanded", open ? "true" : "false");
    });
    nav.querySelectorAll("a").forEach(a => a.addEventListener("click", () => {
      nav.classList.remove("open");
      toggle.classList.remove("open");
      toggle.setAttribute("aria-expanded", "false");
    }));
  }

  function setupLangButtons(){
    document.querySelectorAll(".lang-switch button").forEach(btn => {
      btn.addEventListener("click", () => setLang(btn.dataset.lang));
    });
  }

  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("year").textContent = new Date().getFullYear();
    setupNav();
    setupLangButtons();
    setLang(LANG);
  });
})();

</script>
</body>
</html>
